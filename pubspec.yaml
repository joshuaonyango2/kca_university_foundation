# pubspec.yaml — KCA University Foundation Fundraising App

name: kca_foundation
description: KCA University Foundation Fundraising & Donations App
publish_to: 'none'
version: 1.3.0+7

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────────
  firebase_core:        ^4.5.0
  firebase_auth:        ^6.2.0
  cloud_firestore:      ^6.1.3
  firebase_storage:     ^13.1.0
  firebase_messaging:   ^16.1.2
  google_sign_in:       6.2.1        # pinned — v7 breaks auth API

  # ── State ─────────────────────────────────────────────────────────────────
  provider:             ^6.1.2

  # ── Navigation ────────────────────────────────────────────────────────────
  go_router:            ^17.1.0

  # ── UI ────────────────────────────────────────────────────────────────────
  flutter_svg:          ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer:              ^3.0.0
  lottie:               ^3.1.2

  # ── PDF generation ────────────────────────────────────────────────────────
  pdf:                  ^3.11.0
  printing:             ^5.13.0

  # ── File handling ──────────────────────────────────────────────────────────
  file_picker:          ^10.3.10
  share_plus:           ^12.0.1
  path_provider:        ^2.1.3
  open_file:            ^3.5.1
  url_launcher:         ^6.3.0

  # ── Web utilities ─────────────────────────────────────────────────────────
  universal_html:       ^2.2.4
  web:                  ^1.1.1

  # ── Networking / Payments ─────────────────────────────────────────────────
  http:                 ^1.2.1
  flutterwave_standard: ^1.0.9

  # ── Email ─────────────────────────────────────────────────────────────────
  flutter_email_sender: ^8.0.0

  # ── Storage / Prefs ───────────────────────────────────────────────────────
  shared_preferences:   ^2.2.3

  # ── Utilities ─────────────────────────────────────────────────────────────
  intl:                 ^0.20.2
  equatable:            ^2.0.5
  uuid:                 ^4.4.0
  timeago:              ^3.6.1

  # ── Excel export ──────────────────────────────────────────────────────────
  excel:                ^4.0.3

  # ── Image / Video ──────────────────────────────────────────────────────────
  image_picker:         ^1.1.2
  video_player:         ^2.8.7
  flutter_cache_manager: ^3.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:          ^6.0.0
  build_runner:           ^2.4.9
  flutter_launcher_icons: ^0.14.1   # ← PRIORITY 4: app icon generation

# ── App icon config (PRIORITY 4) ──────────────────────────────────────────
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/image.asset.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B2263"
  adaptive_icon_foreground: "assets/image.asset.png"
  web:
    generate: true
    image_path: "assets/image.asset.png"
    background_color: "#1B2263"
    theme_color: "#F5A800"

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/
    # Note: assets/icons/ and assets/fonts/ removed — directories don't exist.
    # Roboto is included automatically via uses-material-design: true.